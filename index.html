<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-950 text-slate-100">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jira Status Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="h-full flex flex-col font-sans">

  <header class="border-b border-slate-800 bg-slate-900 px-6 py-4 flex items-center justify-between z-10 shadow-sm">
    <div class="flex items-center space-x-3">
      <div class="bg-amber-500 text-slate-950 p-2 rounded-lg font-bold text-sm">Jira</div>
      <h1 class="text-xl font-semibold tracking-tight text-slate-200">Tracker Workspace</h1>
    </div>
    <button onclick="openNewTicketModal()" class="bg-amber-500 hover:bg-amber-400 text-slate-950 px-4 py-2 rounded-lg text-sm font-medium transition-colors shadow-lg">
      + New Ticket
    </button>
  </header>

  <div class="flex-1 flex overflow-hidden">
    
    <aside class="w-[26rem] border-r border-slate-800 bg-slate-900/50 flex flex-col">
      <div class="flex overflow-x-auto border-b border-slate-800 bg-slate-900 text-xs no-scrollbar">
        <button onclick="setTab('Ongoing', 'tab-ongoing')" id="tab-ongoing" class="px-4 py-3 font-semibold border-b-2 border-amber-500 text-amber-500 whitespace-nowrap transition-colors">Ongoing</button>
        <button onclick="setTab('Parked Dev', 'tab-parkeddev')" id="tab-parkeddev" class="px-4 py-3 font-semibold border-b-2 border-transparent text-slate-400 hover:text-slate-200 whitespace-nowrap transition-colors">Parked Dev</button>
        <button onclick="setTab('Parked', 'tab-parked')" id="tab-parked" class="px-4 py-3 font-semibold border-b-2 border-transparent text-slate-400 hover:text-slate-200 whitespace-nowrap transition-colors">Parked</button>
        <button onclick="setTab('Finished', 'tab-finished')" id="tab-finished" class="px-4 py-3 font-semibold border-b-2 border-transparent text-slate-400 hover:text-slate-200 whitespace-nowrap transition-colors">Finished</button>
      </div>
      <div class="p-4 border-b border-slate-800">
        <input type="text" id="searchBar" placeholder="Search Jiras..." class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-amber-500 text-slate-200 shadow-inner">
      </div>
      <div id="ticketList" class="flex-1 overflow-y-auto divide-y divide-slate-800/60">
        <p class="text-slate-500 text-sm p-4 text-center">Loading tickets...</p>
      </div>
    </aside>

    <main id="workspace" class="flex-1 flex flex-col bg-slate-950 overflow-hidden relative">
      <div class="flex-1 flex items-center justify-center text-slate-500 p-8 text-center">
        <p>Select a Jira ticket from a folder on the left to view its timeline.</p>
      </div>
    </main>
  </div>

  <div id="newTicketModal" class="hidden fixed inset-0 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center p-4 z-50">
    <div class="bg-slate-900 border border-slate-800 rounded-xl max-w-md w-full p-6 shadow-2xl">
      <h3 class="text-lg font-medium text-slate-200 mb-4">Add New Jira Ticket</h3>
      <div class="space-y-4">
        <div>
          <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1">Jira ID</label>
          <input type="text" id="newJiraId" placeholder="e.g., OPPR-10515" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-amber-500 text-slate-100">
        </div>
        <div>
          <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1">Subject</label>
          <input type="text" id="newSubject" placeholder="Brief subject" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-amber-500 text-slate-100">
        </div>
        <div>
          <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1">Summary / Details</label>
          <textarea id="newSummary" rows="2" placeholder="Additional details..." class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-amber-500 text-slate-100 resize-none"></textarea>
        </div>
        <div>
          <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1">Hyperlink (Optional)</label>
          <input type="url" id="newTicketLink" placeholder="https://..." class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-amber-500 text-slate-100">
        </div>
      </div>
      <div class="flex justify-end space-x-3 mt-6">
        <button onclick="closeNewTicketModal()" class="px-4 py-2 text-sm font-medium text-slate-400 hover:text-slate-200">Cancel</button>
        <button onclick="createNewTicket()" class="bg-amber-500 hover:bg-amber-400 text-slate-950 px-4 py-2 rounded-lg text-sm font-bold shadow-lg">Save Ticket</button>
      </div>
    </div>
  </div>

  <div id="editNoteModal" class="hidden fixed inset-0 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center p-4 z-50">
    <div class="bg-slate-900 border border-slate-800 rounded-xl max-w-2xl w-full p-6 shadow-2xl">
      <h3 class="text-lg font-medium text-slate-200 mb-4">Edit Note</h3>
      <textarea id="editNoteText" rows="5" class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-amber-500 text-slate-100 shadow-inner resize-none"></textarea>
      <div class="flex justify-end space-x-3 mt-4">
        <button onclick="closeEditNoteModal()" class="px-4 py-2 text-sm font-medium text-slate-400 hover:text-slate-200">Cancel</button>
        <button onclick="saveEditedNote()" class="bg-amber-500 hover:bg-amber-400 text-slate-950 px-4 py-2 rounded-lg text-sm font-bold shadow-lg">Update Note</button>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://jikqrfseacrrekpolbsa.supabase.co";
    const SUPABASE_ANON_KEY = ""; 
    let dbClient = null;

    let allTickets = [];
    let currentTab = 'Ongoing';
    const STATUS_MAP = {
      'Ongoing': ['Waiting Reply', 'Waiting reply', 'In progress'],
      'Parked Dev': ['Jira Parked Dev'],
      'Parked': ['Jira Parked'],
      'Finished': ['Jira Done', 'Jira Closed']
    };

    let currentEditNoteId = null;
    let currentOpenTicketId = null;

    function openNewTicketModal() { document.getElementById('newTicketModal').classList.remove('hidden'); }
    function closeNewTicketModal() { document.getElementById('newTicketModal').classList.add('hidden'); }
    
    function openEditNoteModal(noteId, encodedText) {
      currentEditNoteId = noteId;
      document.getElementById('editNoteText').value = decodeURIComponent(encodedText);
      document.getElementById('editNoteModal').classList.remove('hidden');
    }
    function closeEditNoteModal() { document.getElementById('editNoteModal').classList.add('hidden'); }

    document.getElementById('searchBar').addEventListener('input', renderTickets);

    function setTab(tabName, tabId) {
      currentTab = tabName;
      ['tab-ongoing', 'tab-parkeddev', 'tab-parked', 'tab-finished'].forEach(id => {
        const el = document.getElementById(id);
        if(id === tabId) {
          el.classList.add('border-amber-500', 'text-amber-500');
          el.classList.remove('border-transparent', 'text-slate-400');
        } else {
          el.classList.remove('border-amber-500', 'text-amber-500');
          el.classList.add('border-transparent', 'text-slate-400');
        }
      });
      renderTickets();
    }

    async function fetchTickets() {
      if (!dbClient) return;
      const { data, error } = await dbClient.from('tickets').select('*').order('last_updated', { ascending: false });
      if (error) { document.getElementById('ticketList').innerHTML = `<p class="text-red-500 text-sm p-4">${error.message}</p>`; return; }
      allTickets = data || [];
      renderTickets();
    }

    function renderTickets() {
      const list = document.getElementById('ticketList');
      const searchTerm = document.getElementById('searchBar').value.toLowerCase();
      
      const filtered = allTickets.filter(t => {
        const status = t.status || 'Waiting Reply'; 
        const searchString = `${t.jira_id} ${t.subject || ''} ${t.summary || ''}`.toLowerCase();
        return STATUS_MAP[currentTab].includes(status) && searchString.includes(searchTerm);
      });

      if (filtered.length === 0) { 
        list.innerHTML = `<p class="text-slate-500 text-sm p-4 text-center">No tickets found.</p>`; return; 
      }
      
      list.innerHTML = filtered.map(t => {
        let badgeColor = "bg-slate-800 text-slate-400 border-slate-700";
        if(t.status === 'Waiting Reply' || t.status === 'Waiting reply') badgeColor = "bg-amber-500/10 text-amber-500 border-amber-500/20";
        if(t.status === 'In progress') badgeColor = "bg-blue-500/10 text-blue-400 border-blue-500/20";
        if(t.status === 'Jira Done' || t.status === 'Jira Closed') badgeColor = "bg-emerald-500/10 text-emerald-400 border-emerald-500/20";

        const jiraIdDisplay = t.ticket_link 
          ? `<a href="${t.ticket_link}" target="_blank" onclick="event.stopPropagation();" title="Open Link" class="text-blue-400 hover:text-blue-300 hover:underline font-bold text-[15px] tracking-wide relative z-10 transition-colors">${t.jira_id} <span class="text-xs opacity-70 ml-0.5">↗</span></a>`
          : `<span class="text-amber-500 font-bold text-sm tracking-wide">${t.jira_id}</span>`;

        return `
        <div onclick="openTicket('${t.id}')" class="ticket-item p-4 hover:bg-slate-800 cursor-pointer transition-colors border-l-2 border-transparent hover:border-amber-500 relative">
          <div class="flex justify-between items-start mb-1">
            ${jiraIdDisplay}
            <span class="text-[10px] uppercase font-bold text-slate-500 mt-1">${new Date(t.last_updated).toLocaleDateString()}</span>
          </div>
          ${t.subject ? `<p class="text-slate-200 text-sm font-semibold truncate mb-1">${t.subject}</p>` : ''}
          ${t.summary ? `<p class="text-slate-400 text-xs truncate mb-3">${t.summary}</p>` : ''}
          <span class="inline-block px-2.5 py-1 text-[11px] font-bold uppercase rounded border ${badgeColor}">${t.status || 'Waiting Reply'}</span>
        </div>
      `}).join('');
    }

    async function createNewTicket() {
      const jiraId = document.getElementById('newJiraId').value;
      const subject = document.getElementById('newSubject').value;
      const summary = document.getElementById('newSummary').value;
      const ticketLink = document.getElementById('newTicketLink').value;
      
      if(!jiraId) return alert("Jira ID is required!");
      
      const { error } = await dbClient.from('tickets').insert([{ 
        jira_id: jiraId, 
        subject: subject,
        summary: summary, 
        status: 'Waiting Reply',
        ticket_link: ticketLink
      }]);
      
      if(error) { alert("Error: " + error.message); } else {
        closeNewTicketModal();
        document.getElementById('newJiraId').value = '';
        document.getElementById('newSubject').value = '';
        document.getElementById('newSummary').value = '';
        document.getElementById('newTicketLink').value = ''; 
        setTab('Ongoing', 'tab-ongoing');
        fetchTickets(); 
      }
    }

    async function deleteTicket(ticketId) {
      if(!confirm("⚠️ Are you sure you want to PERMANENTLY delete this ticket and all its notes?")) return;
      await dbClient.from('ticket_updates').delete().eq('ticket_id', ticketId);
      await dbClient.from('tickets').delete().eq('id', ticketId);
      
      document.getElementById('workspace').innerHTML = `<div class="flex-1 flex items-center justify-center text-slate-500"><p>Ticket deleted successfully.</p></div>`;
      fetchTickets();
    }

    async function openTicket(id) {
      currentOpenTicketId = id;
      const workspace = document.getElementById('workspace');
      workspace.innerHTML = `<div class="flex-1 flex items-center justify-center"><p class="text-amber-500 animate-pulse">Loading workspace...</p></div>`;

      const { data: ticket } = await dbClient.from('tickets').select('*').eq('id', id).single();
      const { data: updates } = await dbClient.from('ticket_updates').select('*').eq('ticket_id', id).order('created_at', { ascending: true });

      const statusOptions = ['Waiting Reply', 'In progress', 'Jira Parked Dev', 'Jira Parked', 'Jira Done', 'Jira Closed'];
      
      let updatesHtml = updates.length === 0 
        ? `<div class="flex-1 flex items-center justify-center text-slate-600 italic">No notes yet.</div>` 
        : `<div class="space-y-4">` + updates.map(u => `
            <div class="bg-slate-900 border border-slate-800 p-5 rounded-xl group relative">
              <div class="flex justify-between items-center mb-3">
                <div class="text-xs font-bold uppercase tracking-wider text-slate-500">${new Date(u.created_at).toLocaleString()}</div>
                <div class="opacity-0 group-hover:opacity-100 transition-opacity space-x-2">
                  <button onclick="openEditNoteModal('${u.id}', '${encodeURIComponent(u.content || '')}')" class="text-xs text-blue-400 hover:text-blue-300">Edit</button>
                  <button onclick="deleteNote('${u.id}')" class="text-xs text-red-500 hover:text-red-400">Delete</button>
                </div>
              </div>
              <div class="text-slate-200 text-sm whitespace-pre-wrap leading-relaxed">${u.content}</div>
            </div>
          `).join('') + `</div>`;

      const headerDisplay = ticket.ticket_link
        ? `<a href="${ticket.ticket_link}" target="_blank" title="Open Link" class="hover:text-blue-400 hover:underline transition-colors flex items-center gap-2 w-fit">
            ${ticket.jira_id}
            <svg class="w-5 h-5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
          </a>`
        : ticket.jira_id;

      workspace.innerHTML = `
        <div class="flex flex-col h-full w-full">
          <div class="p-6 border-b border-slate-800 bg-slate-900 flex justify-between items-start">
            <div class="max-w-2xl">
              <h2 class="text-2xl font-bold text-slate-100 mb-2">${headerDisplay}</h2>
              ${ticket.subject ? `<h3 class="text-lg font-semibold text-slate-200 mb-1">${ticket.subject}</h3>` : ''}
              ${ticket.summary ? `<p class="text-slate-400 text-sm">${ticket.summary}</p>` : ''}
            </div>
            <div class="flex items-center space-x-3">
              <select onchange="updateStatus('${id}', this.value)" class="bg-slate-950 border border-slate-700 rounded-lg px-4 py-2 text-sm font-medium text-slate-200 focus:outline-none focus:border-amber-500">
                ${statusOptions.map(s => `<option value="${s}" ${ticket.status === s ? 'selected' : ''}>${s}</option>`).join('')}
              </select>
              <button onclick="deleteTicket('${id}')" class="bg-red-500/10 text-red-500 border border-red-500/20 hover:bg-red-500/20 px-3 py-2 rounded-lg text-sm transition-colors" title="Delete Ticket">🗑️</button>
            </div>
          </div>
          
          <div class="flex-1 overflow-y-auto p-6 bg-slate-950/50">
            ${updatesHtml}
          </div>

          <div class="p-6 border-t border-slate-800 bg-slate-900">
            <textarea id="newUpdateText" rows="3" placeholder="Type your notes..." class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-amber-500 text-slate-100 mb-4 resize-none"></textarea>
            <div class="flex justify-end">
              <button onclick="addUpdate('${id}')" id="postBtn" class="bg-amber-500 hover:bg-amber-400 text-slate-950 px-6 py-2.5 rounded-lg text-sm font-bold shadow-lg">Post Update</button>
            </div>
          </div>
        </div>
      `;
    }

    async function addUpdate(ticketId) {
      const text = document.getElementById('newUpdateText').value;
      if (!text.trim()) return;
      
      const { error } = await dbClient.from('ticket_updates').insert([{ ticket_id: ticketId, content: text }]);
      if (error) { alert("Error saving note: " + error.message); return; }

      await dbClient.from('tickets').update({ last_updated: new Date().toISOString() }).eq('id', ticketId);
      openTicket(ticketId); 
      fetchTickets(); 
    }

    async function saveEditedNote() {
      const newText = document.getElementById('editNoteText').value;
      await dbClient.from('ticket_updates').update({ content: newText }).eq('id', currentEditNoteId);
      closeEditNoteModal();
      openTicket(currentOpenTicketId);
    }

    async function deleteNote(noteId) {
      if(!confirm("Delete this note?")) return;
      await dbClient.from('ticket_updates').delete().eq('id', noteId);
      openTicket(currentOpenTicketId);
    }

    async function updateStatus(ticketId, newStatus) {
      await dbClient.from('tickets').update({ status: newStatus, last_updated: new Date().toISOString() }).eq('id', ticketId);
      fetchTickets(); 
    }

    window.onload = () => {
      if(SUPABASE_ANON_KEY) {
        dbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        fetchTickets();
      }
    };
  </script>
</body>
</html>
